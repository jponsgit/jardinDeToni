    <script>
        document.addEventListener('DOMContentLoaded', () => {
    
            const btnEnviar = document.getElementById('btnEnviar');
            const formulario = document.getElementById('miFormulario');

            btnEnviar.addEventListener('click', () => {
                
                const nombre = document.getElementById('nombre').value.trim();
                const email = document.getElementById('email').value.trim();
                const servicios = document.getElementById('servicios').value.trim();

                if (nombre === '') {
                    alert('El campo Nombre no puede estar vacío.');
                    return; 
                }

                const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!regexEmail.test(email)) {
                    alert('Por favor, introduce un email con sintaxis correcta.');
                    return;
                }

                if (servicios === '') {
                    alert('El campo Servicio/s no puede estar vacío.');
                    return;
                }
                
                alert('Datos enviados y guardados correctamente.');
            });
        });
    </script>
